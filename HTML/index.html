<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pokémon App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
  <div class="container">
    <span class="navbar-brand mb-0 h1">Pokémon API</span>
  </div>
</nav>

<div class="container mt-4">

  <!-- 🔴 POKÉMON -->
  <h2 class="text-danger">Pokémons</h2>
  <div id="pokemonCarousel" class="carousel slide position-relative" data-bs-ride="carousel" data-bs-interval="3000">
    
    <div class="carousel-inner" id="pokemonContainer"></div>

    <!-- CONTROLES -->
    <button class="carousel-control-prev" type="button" data-bs-target="#pokemonCarousel" data-bs-slide="prev" aria-label="Anterior">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#pokemonCarousel" data-bs-slide="next" aria-label="Siguiente">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>


  <!-- 🔵 LOCACIONES -->
  <h2 class="text-primary mt-5">Locaciones</h2>
  <div id="locationCarousel" class="carousel slide position-relative" data-bs-ride="carousel" data-bs-interval="4000">
    
    <div class="carousel-inner" id="locationContainer"></div>

    <button class="carousel-control-prev" type="button" data-bs-target="#locationCarousel" data-bs-slide="prev" aria-label="Anterior">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#locationCarousel" data-bs-slide="next" aria-label="Siguiente">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>


  <!-- 🟢 JUEGOS -->
  <h2 class="text-success mt-5">Juegos</h2>
  <div id="gameCarousel" class="carousel slide position-relative" data-bs-ride="carousel" data-bs-interval="5000">
    
    <div class="carousel-inner" id="gameContainer"></div>

    <button class="carousel-control-prev" type="button" data-bs-target="#gameCarousel" data-bs-slide="prev" aria-label="Anterior">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#gameCarousel" data-bs-slide="next" aria-label="Siguiente">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="../JS/index.js"></script>

</body>
</html>
